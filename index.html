<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Digital Bill Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<header class="navbar">
    <div class="menu-icon" onclick="toggleSettings()">☰</div>
    <div class="logo">STAR DIGITAL</div>
    <div onclick="toggleSettings()"><i class="fas fa-cog"></i></div> 
</header>

<div id="shop-settings" class="settings-modal">
    <div class="modal-content">
        <h4><i class="fas fa-store"></i> Shop Settings</h4>
        <hr>
        <label>Shop Details</label>
        <input type="text" id="set-shop-name" placeholder="Shop ka Naam">
        <input type="text" id="set-shop-contact" placeholder="Shop Mobile Number">
        
        <label>Customer Details</label>
        <input type="text" id="set-cust-name" placeholder="Customer Name">
        <input type="text" id="set-cust-contact" placeholder="Customer Mobile">
        
        <div class="modal-buttons">
            <button onclick="saveShopDetails()" class="save-btn">Save Details</button>
            <button onclick="toggleSettings()" class="close-btn">Close</button>
        </div>
    </div>
</div>

<div class="main-wrapper">
    <div class="calculator-container">
        <div class="item-entry-bar">
            <input type="text" id="item-name" placeholder="Item ka naam (e.g. Samosa)">
        </div>

        <div class="display-box">
            <div class="display-row" id="hist-scroll"><span class="label">History:</span> <span id="history-row"></span></div>
            <div class="display-row"><span class="label">Sub-Total:</span> <span id="grand-total">0</span></div>
            <div class="display-row live-row"><span class="label">Live:</span> <input type="text" id="live-display" value="0" readonly></div>
        </div>

        <div class="extra-inputs">
            <div class="input-group">
                <label>Pichla Udhar</label>
                <input type="number" id="prevDue" value="0" onclick="setCurrentInput('prevDue')" readonly>
            </div>
            <div class="input-group">
                <label>Aaj Jama</label>
                <input type="number" id="received" value="0" onclick="setCurrentInput('received')" readonly>
            </div>
        </div>

        <div class="grand-balance-box">
            <span>Net Balance:</span>
            <span id="net-result">₹ 0</span>
        </div>

        <div class="buttons">
            <button onclick="clearAll()" class="btn-clear">AC</button>
            <button onclick="undo()" class="btn-undo">Undo</button>
            <button onclick="backspace()" class="btn-op">⌫</button>
            <button onclick="addOperator('/')" class="btn-op">÷</button>
            
            <button onclick="addNumber('7')">7</button>
            <button onclick="addNumber('8')">8</button>
            <button onclick="addNumber('9')">9</button>
            <button onclick="addOperator('*')" class="btn-op">×</button>
            
            <button onclick="addNumber('4')">4</button>
            <button onclick="addNumber('5')">5</button>
            <button onclick="addNumber('6')">6</button>
            <button onclick="addOperator('+')" class="btn-op">+</button>
            
            <button onclick="addNumber('1')">1</button>
            <button onclick="addNumber('2')">2</button>
            <button onclick="addNumber('3')">3</button>
            <button onclick="calculate()" class="btn-equal">=</button>
            
            <button onclick="addNumber('0')">0</button>
            <button onclick="addNumber('.')">.</button>
            <button onclick="printBill()" class="btn-print">PRINT</button>
        </div>
    </div>
</div>

<footer class="footer">
    <a href="#" onclick="alert('Dashboard Coming Soon')">Dashboard</a>
    <a href="#" onclick="alert('History Feature Coming Soon')">History</a>
    <a href="#" onclick="toggleSettings()">Settings</a>
    <a href="Simplecalc.html">
  <button>simple</button>
        <a href="Simple2calc.html">
  <button>simple2</button>
           
        <a href="category.html">
  <button>category</button>
</a>
</footer>

<div id="printArea" style="display:none;"></div>

<script src="script.js"></script>
</body>
</html>
