        const products = [
            { id: 1, name: "Lux Soap", brand: "Unilever", cat: "Grocery", rate: 35.50, img: "🧼" },
            { id: 2, name: "Amul Milk", brand: "Amul", cat: "Grocery", rate: 28.00, img: "🥛" },

                if(item.qty <= 0) cart = cart.filter(i => i.id !== id);
                updateUI();
            }

        }

        function clearBill() {
            cart = [];
            updateUI();

        renderProducts();
        updateUI();

<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saral Bill Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-cat { border-left: 4px solid #9333ea; background: #f3e8ff; color: #9333ea; font-weight: bold; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border-bottom: 1px solid #eee; padding: 8px; text-align: left; font-size: 12px; }
        .img-preview { width: 40px; height: 40px; object-fit: cover; border-radius: 4px; background: #eee; }
    </style>
</head>
<body class="bg-gray-50 flex flex-col h-screen overflow-hidden">

    <header class="bg-purple-700 text-white p-3 flex justify-between items-center shadow-lg">
        <span class="font-bold">Saral Bill Pro</span>
        <button onclick="toggleModal()" class="bg-white text-purple-700 px-3 py-1 rounded-full text-sm font-bold">+ New Item</button>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <aside id="sidebar" class="w-24 bg-white border-r overflow-y-auto no-scrollbar order-2">
            </aside>

        <main class="flex-1 overflow-x-auto order-1 bg-white">
            <table id="product-table">
                <thead class="bg-gray-100 sticky top-0">
                    <tr>
                        <th>Img</th>
                        <th>Name</th>
                        <th>Rate</th>
                        <th>Cat/Sub</th>
                        <th>Brand</th>
                        <th>✅</th>
                    </tr>
                </thead>
                <tbody id="inventory-list">
                    </tbody>
            </table>
        </main>
    </div>

    <div id="bill-drawer" class="bg-purple-50 border-t-2 border-purple-200 p-3 max-h-60 overflow-y-auto shadow-2xl">
        <h3 class="text-xs font-bold text-purple-700 uppercase mb-2">Live Bill Preview</h3>
        <div id="bill-items" class="space-y-1"></div>
        <div class="flex justify-between items-center mt-2 pt-2 border-t border-purple-200">
            <span class="font-bold">Total: ₹<span id="grand-total">0.00</span></span>
            <button onclick="clearBill()" class="text-xs bg-red-100 text-red-600 px-2 py-1 rounded">Reset Bill</button>
        </div>
    </div>

    <div id="productModal" class="fixed inset-0 bg-black bg-opacity-70 hidden items-center justify-center p-4 z-[100]">
        <div class="bg-white rounded-xl w-full max-w-md p-5 overflow-y-auto max-h-[90vh]">
            <h2 class="font-bold text-lg mb-4 text-purple-800">Add New Product</h2>
            
            <div class="space-y-3">
                <div class="flex flex-col items-center gap-2 border-2 border-dashed p-2 rounded">
                    <video id="video" class="hidden w-full rounded" autoplay playsinline></video>
                    <canvas id="canvas" class="hidden"></canvas>
                    <img id="photo-preview" src="" class="img-preview w-20 h-20 hidden">
                    <button id="snap" onclick="startCamera()" class="bg-blue-500 text-white p-2 rounded text-xs">📷 Take Photo</button>
                </div>

                <input type="text" id="newName" placeholder="Product Name" class="w-full border p-2 rounded">
                <div class="flex gap-2">
                    <input type="text" id="newCat" placeholder="Category" class="w-full border p-2 rounded text-sm">
                    <input type="text" id="newSubCat" placeholder="Sub-Cat" class="w-full border p-2 rounded text-sm">
                </div>
                <input type="text" id="newBrand" placeholder="Brand/Company" class="w-full border p-2 rounded">
                <input type="number" id="newRate" step="0.01" placeholder="Rate (Decimal)" class="w-full border p-2 rounded font-bold text-blue-600">
                
                <div class="flex gap-2 pt-4">
                    <button onclick="saveToInventory()" class="flex-1 bg-purple-600 text-white py-3 rounded-lg font-bold">Save Item</button>
                    <button onclick="toggleModal()" class="flex-1 bg-gray-200 py-3 rounded-lg">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let inventory = JSON.parse(localStorage.getItem('myInventory')) || [];
        let cart = [];
        let currentPhoto = '';

        // --- Camera Logic ---
        async function startCamera() {
            const video = document.getElementById('video');
            const snapBtn = document.getElementById('snap');
            
            if (snapBtn.innerText === "📷 Take Photo") {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;
                video.classList.remove('hidden');
                snapBtn.innerText = "🎯 Capture";
            } else {
                const canvas = document.getElementById('canvas');
                canvas.width = 400; canvas.height = 400;
                canvas.getContext('2d').drawImage(video, 0, 0, 100, 100);
                currentPhoto = canvas.toDataURL('image/jpeg');
                document.getElementById('photo-preview').src = currentPhoto;
                document.getElementById('photo-preview').classList.remove('hidden');
                video.classList.add('hidden');
                video.srcObject.getTracks().forEach(track => track.stop());
                snapBtn.innerText = "📷 Retake";
            }
        }

        // --- Inventory Management ---
        function saveToInventory() {
            const item = {
                id: Date.now(),
                name: document.getElementById('newName').value,
                cat: document.getElementById('newCat').value || 'Other',
                subCat: document.getElementById('newSubCat').value || 'N/A',
                brand: document.getElementById('newBrand').value,
                rate: parseFloat(document.getElementById('newRate').value) || 0,
                img: currentPhoto || '📦'
            };

            if(!item.name || !item.rate) return alert("Name & Rate are must!");
            
            inventory.push(item);
            localStorage.setItem('myInventory', JSON.stringify(inventory));
            renderAll();
            toggleModal();
        }

        function renderAll() {
            // Render Sidebar Categories
            const cats = ['All', ...new Set(inventory.map(i => i.cat))];
            document.getElementById('sidebar').innerHTML = cats.map(c => 
                `<div onclick="filterByCat('${c}')" class="p-3 text-[10px] text-center border-b cursor-pointer">${c}</div>`
            ).join('');

            // Render Table
            renderTable(inventory);
        }

        function renderTable(data) {
            const list = document.getElementById('inventory-list');
            list.innerHTML = data.map(item => `
                <tr>
                    <td><img src="${item.img.length > 10 ? item.img : 'https://via.placeholder.com/40'}" class="img-preview"></td>
                    <td class="font-bold">${item.name}</td>
                    <td class="text-blue-600">₹${item.rate.toFixed(2)}</td>
                    <td><span class="text-[10px] block text-gray-400">${item.cat}</span>${item.subCat}</td>
                    <td>${item.brand}</td>
                    <td><button onclick="addToBill(${item.id})" class="bg-green-500 text-white w-8 h-8 rounded shadow">✅</button></td>
                </tr>
            `).join('');
        }

        function filterByCat(cat) {
            if(cat === 'All') return renderTable(inventory);
            const filtered = inventory.filter(i => i.cat === cat);
            renderTable(filtered);
        }

        // --- Billing Logic ---
        function addToBill(id) {
            const prod = inventory.find(i => i.id === id);
            const exist = cart.find(c => c.id === id);
            if(exist) exist.qty += 1;
            else cart.push({...prod, qty: 1});
            updateBillUI();
        }

        function updateQty(id, delta) {
            const item = cart.find(i => i.id === id);
            if(item) {
                item.qty = parseFloat((item.qty + delta).toFixed(3));
                if(item.qty <= 0) cart = cart.filter(i => i.id !== id);
                updateBillUI();
            }
        }

        function updateBillUI() {
            const container = document.getElementById('bill-items');
            let total = 0;
            container.innerHTML = cart.map(item => {
                const amt = item.rate * item.qty;
                total += amt;
                return `
                    <div class="flex justify-between items-center text-xs bg-white p-1 rounded shadow-sm">
                        <span class="w-1/3">${item.name}</span>
                        <div class="flex items-center gap-1">
                            <button onclick="updateQty(${item.id}, -1)" class="bg-gray-200 px-2 rounded">-</button>
                            <span class="font-bold">${item.qty}</span>
                            <button onclick="updateQty(${item.id}, 1)" class="bg-gray-200 px-2 rounded">+</button>
                        </div>
                        <span class="w-1/4 text-right font-bold">₹${amt.toFixed(2)}</span>
                    </div>
                `;
            }).join('');
            document.getElementById('grand-total').innerText = total.toFixed(2);
        }

        function toggleModal() {
            const m = document.getElementById('productModal');
            m.classList.toggle('hidden');
            m.classList.toggle('flex');
            currentPhoto = '';
            document.getElementById('photo-preview').classList.add('hidden');
        }

        function clearBill() { cart = []; updateBillUI(); }

        renderAll();
    </script>
</body>
</html>

<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saral Bill Pro V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-cat { border-left: 4px solid #9333ea; background: #f3e8ff; color: #9333ea; font-weight: bold; }
        /* Badi Round Image */
        .img-circle { width: 60px; height: 60px; object-fit: cover; border-radius: 50%; border: 2px solid #ddd; background: #fff; }
        tr:active { background-color: #f3f4f6; } /* Touch effect */
        .btn-action { @apply flex-1 py-2 rounded text-white text-xs font-bold flex flex-col items-center justify-center; }
    </style>
</head>
<body class="bg-gray-100 flex flex-col h-screen overflow-hidden">

    <header class="bg-purple-800 text-white p-3 flex justify-between items-center shadow-md">
        <span class="font-bold">Saral Bill Pro</span>
        <button onclick="openNewItemModal()" class="bg-green-500 px-4 py-1 rounded-full text-sm font-bold shadow">+ Item</button>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <aside id="sidebar" class="w-20 bg-white border-r overflow-y-auto no-scrollbar order-2"></aside>

        <main class="flex-1 overflow-y-auto order-1 bg-white">
            <table class="w-full text-left border-collapse">
                <thead class="sticky top-0 bg-gray-200 text-[10px] uppercase">
                    <tr>
                        <th class="p-2">Product (Tap to Add)</th>
                        <th class="p-2">Details</th>
                        <th class="p-2">Rate</th>
                        <th class="p-2">Edit</th>
                    </tr>
                </thead>
                <tbody id="inventory-list"></tbody>
            </table>
        </main>
    </div>

    <section class="bg-white border-t-2 border-purple-300 p-2 shadow-2xl">
        <div id="bill-items" class="max-h-40 overflow-y-auto space-y-1 mb-2"></div>
        
        <div class="flex justify-between items-center px-2 py-1 bg-purple-100 rounded mb-2 font-bold">
            <span class="text-purple-800">TOTAL:</span>
            <span class="text-xl">₹<span id="grand-total">0.00</span></span>
        </div>

        <div class="flex gap-1">
            <button onclick="saveBill()" class="btn-action bg-blue-600">💾<span>Save</span></button>
            <button onclick="shareBill()" class="btn-action bg-green-600">📤<span>Share</span></button>
            <button onclick="window.print()" class="btn-action bg-gray-700">🖨️<span>Print</span></button>
            <button onclick="exportCSV()" class="btn-action bg-orange-600">📊<span>CSV</span></button>
            <button onclick="clearBill()" class="btn-action bg-red-500 text-[10px]">🗑️<span>Clear</span></button>
        </div>
    </section>

    <div id="productModal" class="fixed inset-0 bg-black/80 hidden items-center justify-center p-4 z-[100]">
        <div class="bg-white rounded-2xl w-full max-w-sm p-5 space-y-3">
            <h2 id="modalTitle" class="font-bold text-lg text-purple-700">Naya Item Add Karein</h2>
            
            <div class="flex flex-col items-center border p-2 rounded bg-gray-50">
                <video id="video" class="hidden w-32 h-32 rounded-full object-cover border-2 border-purple-500" autoplay playsinline></video>
                <img id="photo-preview" src="" class="img-circle w-24 h-24 hidden">
                <button onclick="startCamera()" class="mt-2 text-blue-600 font-bold text-sm">📸 Camera Open Karein</button>
            </div>

            <input type="hidden" id="editId">
            <input type="text" id="newName" placeholder="Product Name" class="w-full border p-2 rounded">
            <div class="flex gap-2 text-sm">
                <input type="text" id="newCat" placeholder="Category" class="w-1/2 border p-2 rounded">
                <input type="text" id="newSubCat" placeholder="Sub-Cat" class="w-1/2 border p-2 rounded">
            </div>
            <input type="text" id="newBrand" placeholder="Company/Brand" class="w-full border p-2 rounded">
            <input type="number" id="newRate" step="0.01" placeholder="Rate (0.00)" class="w-full border-2 border-purple-200 p-2 rounded text-lg font-bold">
            
            <div class="flex gap-2">
                <button onclick="saveToInventory()" class="flex-1 bg-purple-700 text-white py-3 rounded-xl font-bold">💾 Save Karein</button>
                <button onclick="toggleModal()" class="flex-1 bg-gray-200 py-3 rounded-xl">Hatao</button>
            </div>
        </div>
    </div>

    <canvas id="canvas" class="hidden"></canvas>

    <script>
        let inventory = JSON.parse(localStorage.getItem('myInventory')) || [];
        let cart = [];
        let currentPhoto = '';

        // --- Core Functions ---
        function openNewItemModal() {
            document.getElementById('editId').value = '';
            document.getElementById('newName').value = '';
            document.getElementById('newCat').value = '';
            document.getElementById('newSubCat').value = '';
            document.getElementById('newBrand').value = '';
            document.getElementById('newRate').value = '';
            document.getElementById('photo-preview').classList.add('hidden');
            document.getElementById('video').classList.add('hidden');
            currentPhoto = '';
            document.getElementById('modalTitle').innerText = "Naya Item Add Karein";
            toggleModal();
        }

        async function startCamera() {
            const video = document.getElementById('video');
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = stream;
            video.classList.remove('hidden');
            document.getElementById('photo-preview').classList.add('hidden');
            
            video.onclick = () => {
                const canvas = document.getElementById('canvas');
                canvas.width = 200; canvas.height = 200;
                canvas.getContext('2d').drawImage(video, 0, 0, 200, 200);
                currentPhoto = canvas.toDataURL('image/jpeg');
                document.getElementById('photo-preview').src = currentPhoto;
                document.getElementById('photo-preview').classList.remove('hidden');
                video.classList.add('hidden');
                stream.getTracks().forEach(t => t.stop());
            };
        }

        function saveToInventory() {
            const id = document.getElementById('editId').value;
            const item = {
                id: id ? parseInt(id) : Date.now(),
                name: document.getElementById('newName').value,
                cat: document.getElementById('newCat').value || 'General',
                subCat: document.getElementById('newSubCat').value || 'N/A',
                brand: document.getElementById('newBrand').value,
                rate: parseFloat(document.getElementById('newRate').value) || 0,
                img: currentPhoto || '📦'
            };

            if(id) inventory = inventory.map(i => i.id == id ? item : i);
            else inventory.push(item);

            localStorage.setItem('myInventory', JSON.stringify(inventory));
            renderAll();
            toggleModal();
        }

        function renderAll() {
            const cats = ['All', ...new Set(inventory.map(i => i.cat))];
            document.getElementById('sidebar').innerHTML = cats.map(c => 
                `<div onclick="filterByCat('${c}')" class="p-3 text-[10px] text-center border-b cursor-pointer">${c}</div>`
            ).join('');
            renderTable(inventory);
        }

        function renderTable(data) {
            const list = document.getElementById('inventory-list');
            list.innerHTML = data.map(item => `
                <tr class="border-b">
                    <td class="p-2" onclick="addToBill(${item.id})">
                        <img src="${item.img.length > 10 ? item.img : 'https://via.placeholder.com/60'}" class="img-circle">
                    </td>
                    <td class="p-2" onclick="addToBill(${item.id})">
                        <div class="font-bold text-sm">${item.name}</div>
                        <div class="text-[10px] text-gray-500">${item.brand} | ${item.subCat}</div>
                    </td>
                    <td class="p-2 font-bold text-blue-700">₹${item.rate.toFixed(2)}</td>
                    <td class="p-2">
                        <button onclick="editItem(${item.id})" class="bg-gray-100 p-2 rounded text-lg">✏️</button>
                    </td>
                </tr>
            `).join('');
        }

        function editItem(id) {
            const item = inventory.find(i => i.id === id);
            document.getElementById('editId').value = item.id;
            document.getElementById('newName').value = item.name;
            document.getElementById('newCat').value = item.cat;
            document.getElementById('newSubCat').value = item.subCat;
            document.getElementById('newBrand').value = item.brand;
            document.getElementById('newRate').value = item.rate;
            currentPhoto = item.img;
            document.getElementById('photo-preview').src = item.img;
            document.getElementById('photo-preview').classList.remove('hidden');
            document.getElementById('modalTitle').innerText = "Update Item";
            toggleModal();
        }

        function addToBill(id) {
            const prod = inventory.find(i => i.id === id);
            const exist = cart.find(c => c.id === id);
            if(exist) exist.qty += 1;
            else cart.push({...prod, qty: 1.000});
            updateBillUI();
        }

        function updateQty(id, delta) {
            const item = cart.find(i => i.id === id);
            if(item) {
                item.qty = parseFloat((item.qty + delta).toFixed(3));
                if(item.qty <= 0) cart = cart.filter(i => i.id !== id);
                updateBillUI();
            }
        }

        function updateBillUI() {
            let total = 0;
            document.getElementById('bill-items').innerHTML = cart.map(item => {
                const amt = item.rate * item.qty;
                total += amt;
                return `
                    <div class="flex justify-between items-center text-xs bg-purple-50 p-2 rounded border-l-4 border-purple-500">
                        <span class="w-1/3 font-bold">${item.name}</span>
                        <div class="flex items-center gap-2">
                            <button onclick="updateQty(${item.id}, -1)" class="bg-white px-2 shadow rounded">-</button>
                            <span class="w-10 text-center font-mono">${item.qty.toFixed(3)}</span>
                            <button onclick="updateQty(${item.id}, 0.5)" class="bg-white px-1 shadow rounded text-[10px]">+0.5</button>
                            <button onclick="updateQty(${item.id}, 1)" class="bg-white px-2 shadow rounded">+</button>
                        </div>

async function startCamera() {
    const video = document.getElementById('video');
    const photoPrev = document.getElementById('photo-preview');
    
    // Camera access mangna
    const stream = await navigator.mediaDevices.getUserMedia({ 
        video: { facingMode: "environment" } 
    });
    video.srcObject = stream;
    video.classList.remove('hidden');
    photoPrev.classList.add('hidden');

    // Video par click karte hi photo capture hogi
    video.onclick = () => {
        const canvas = document.createElement('canvas'); // Temporary canvas
        canvas.width = 300; 
        canvas.height = 300;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, 300, 300);
        
        // Photo ko base64 format mein convert karna
        currentPhoto = canvas.toDataURL('image/jpeg', 0.7); 
        
        // Preview dikhana
        photoPrev.src = currentPhoto;
        photoPrev.classList.remove('hidden');
        video.classList.add('hidden');
        
        // Camera band karna taaki battery bache
        stream.getTracks().forEach(track => track.stop());
    };
}

async function printBill() {
    if (cart.length === 0) return alert("Pehle Bill mein items add karein!");

    try {
        // 1. Bluetooth Connection Check
        if (!printerDevice) {
            printerDevice = await navigator.bluetooth.requestDevice({
                filters: [{ namePrefix: 'Bluetooth' }, { namePrefix: 'SRS' }, { namePrefix: 'MPT' }],
                optionalServices: ['000018f0-0000-1000-8000-00805f9b34fb']
            });
        }

        const server = await printerDevice.gatt.connect();
        const service = await server.getPrimaryService('000018f0-0000-1000-8000-00805f9b34fb');
        const characteristic = await service.getCharacteristic('00002af1-0000-1000-8000-00805f9b34fb');

        // 2. Data Preparation
        const shopName = document.getElementById('shopName').value || "Mera Shop";
        const shopContact = document.getElementById('shopContact').value || "";
        const custName = document.getElementById('custName').value || "Cash Customer";
        const totalAmt = document.getElementById('grand-total').innerText;
        const date = new Date().toLocaleDateString('hi-IN') + " " + new Date().toLocaleTimeString('hi-IN', {hour: '2-digit', minute:'2-digit'});

        // 3. ESC/POS Commands (2-inch optimized)
        let esc = '\x1B\x40'; // Initialize
        esc += '\x1B\x61\x01'; // Center Align
        esc += '\x1B\x21\x10' + shopName.toUpperCase() + '\n'; // Double height (Slim)
        if(shopContact) esc += '\x1B\x21\x00' + 'Mob: ' + shopContact + '\n';
        esc += '--------------------------------\n'; // 32 chars
        
        esc += '\x1B\x61\x00'; // Left Align
        esc += `Date: ${date}\n`;
        esc += `Cust: ${custName.substring(0, 25)}\n`;
        esc += '--------------------------------\n';
        esc += 'Item           Qty    Amount\n';
        esc += '--------------------------------\n';

        // 4. Items Loop (Fixed Spacing for 2-inch)
        cart.forEach((item) => {
            let name = item.name.substring(0, 14).padEnd(14, ' ');
            let qty = item.qty.toFixed(2).toString().padStart(6, ' ');
            let amt = (item.rate * item.qty).toFixed(2).toString().padStart(10, ' ');
            esc += `${name}${qty}${amt}\n`;
        });

        esc += '--------------------------------\n';
        esc += '\x1B\x61\x02'; // Right Align
        esc += '\x1B\x21\x10' + `TOTAL: Rs.${totalAmt}\n`; // Bold Total
        
        esc += '\x1B\x61\x01'; // Center
        esc += '\x1B\x21\x00' + '\nDHANYAWAD! VISIT AGAIN\n\n\n\n'; // Extra space for paper cut

        const encoder = new TextEncoder();
        await characteristic.writeValue(encoder.encode(esc));
        
        alert("Printing...");
    } catch (error) {
        console.error(error);
        alert("Printer error! Bluetooth on karein aur check karein.");
    }
}

        window.onload = () => {
    const savedEmail = localStorage.getItem('userEmail');
    const isVerified = localStorage.getItem('isVerified'); // Naya flag

    if (savedEmail && isVerified === "true") {
        // Agar pehle se verified hai, toh bina intezar kiye tool dikhao
        showTool(); 
        if (typeof renderAll === "function") renderAll();
        
        // Background mein silently check karo (security ke liye)
        silentCheck(savedEmail); 
    } else if (savedEmail) {
        document.getElementById('user-email').value = savedEmail;
        checkAccess();
    }
}
        // Ek naya function jo background mein check karega
async function silentCheck(email) {
    try {
        const response = await fetch(`${SCRIPT_URL}?email=${email}`);
        const data = await response.json();
        if (!data.access) {
            // Agar Admin ne block kar diya ya expire ho gaya
            localStorage.removeItem('isVerified');
            window.location.reload(); // Page refresh karke lock screen dikhao
        }
    } catch (e) { console.log("Silent check failed, offline mode?"); }
}
