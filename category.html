<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saral Bill Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-cat { border-left: 4px solid #9333ea; background: #f3e8ff; color: #9333ea; font-weight: bold; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border-bottom: 1px solid #eee; padding: 8px; text-align: left; font-size: 12px; }
        .img-preview { width: 40px; height: 40px; object-fit: cover; border-radius: 4px; background: #eee; }
    </style>
</head>
<body class="bg-gray-50 flex flex-col h-screen overflow-hidden">

    <header class="bg-purple-700 text-white p-3 flex justify-between items-center shadow-lg">
        <span class="font-bold">Saral Bill Pro</span>
        <button onclick="toggleModal()" class="bg-white text-purple-700 px-3 py-1 rounded-full text-sm font-bold">+ New Item</button>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <aside id="sidebar" class="w-24 bg-white border-r overflow-y-auto no-scrollbar order-2">
            </aside>

        <main class="flex-1 overflow-x-auto order-1 bg-white">
            <table id="product-table">
                <thead class="bg-gray-100 sticky top-0">
                    <tr>
                        <th>Img</th>
                        <th>Name</th>
                        <th>Rate</th>
                        <th>Cat/Sub</th>
                        <th>Brand</th>
                        <th>✅</th>
                    </tr>
                </thead>
                <tbody id="inventory-list">
                    </tbody>
            </table>
        </main>
    </div>

    <div id="bill-drawer" class="bg-purple-50 border-t-2 border-purple-200 p-3 max-h-60 overflow-y-auto shadow-2xl">
        <h3 class="text-xs font-bold text-purple-700 uppercase mb-2">Live Bill Preview</h3>
        <div id="bill-items" class="space-y-1"></div>
        <div class="flex justify-between items-center mt-2 pt-2 border-t border-purple-200">
            <span class="font-bold">Total: ₹<span id="grand-total">0.00</span></span>
            <button onclick="clearBill()" class="text-xs bg-red-100 text-red-600 px-2 py-1 rounded">Reset Bill</button>
        </div>
    </div>

    <div id="productModal" class="fixed inset-0 bg-black bg-opacity-70 hidden items-center justify-center p-4 z-[100]">
        <div class="bg-white rounded-xl w-full max-w-md p-5 overflow-y-auto max-h-[90vh]">
            <h2 class="font-bold text-lg mb-4 text-purple-800">Add New Product</h2>
            
            <div class="space-y-3">
                <div class="flex flex-col items-center gap-2 border-2 border-dashed p-2 rounded">
                    <video id="video" class="hidden w-full rounded" autoplay playsinline></video>
                    <canvas id="canvas" class="hidden"></canvas>
                    <img id="photo-preview" src="" class="img-preview w-20 h-20 hidden">
                    <button id="snap" onclick="startCamera()" class="bg-blue-500 text-white p-2 rounded text-xs">📷 Take Photo</button>
                </div>

                <input type="text" id="newName" placeholder="Product Name" class="w-full border p-2 rounded">
                <div class="flex gap-2">
                    <input type="text" id="newCat" placeholder="Category" class="w-full border p-2 rounded text-sm">
                    <input type="text" id="newSubCat" placeholder="Sub-Cat" class="w-full border p-2 rounded text-sm">
                </div>
                <input type="text" id="newBrand" placeholder="Brand/Company" class="w-full border p-2 rounded">
                <input type="number" id="newRate" step="0.01" placeholder="Rate (Decimal)" class="w-full border p-2 rounded font-bold text-blue-600">
                
                <div class="flex gap-2 pt-4">
                    <button onclick="saveToInventory()" class="flex-1 bg-purple-600 text-white py-3 rounded-lg font-bold">Save Item</button>
                    <button onclick="toggleModal()" class="flex-1 bg-gray-200 py-3 rounded-lg">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let inventory = JSON.parse(localStorage.getItem('myInventory')) || [];
        let cart = [];
        let currentPhoto = '';

        // --- Camera Logic ---
        async function startCamera() {
            const video = document.getElementById('video');
            const snapBtn = document.getElementById('snap');
            
            if (snapBtn.innerText === "📷 Take Photo") {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;
                video.classList.remove('hidden');
                snapBtn.innerText = "🎯 Capture";
            } else {
                const canvas = document.getElementById('canvas');
                canvas.width = 100; canvas.height = 100;
                canvas.getContext('2d').drawImage(video, 0, 0, 100, 100);
                currentPhoto = canvas.toDataURL('image/jpeg');
                document.getElementById('photo-preview').src = currentPhoto;
                document.getElementById('photo-preview').classList.remove('hidden');
                video.classList.add('hidden');
                video.srcObject.getTracks().forEach(track => track.stop());
                snapBtn.innerText = "📷 Retake";
            }
        }

        // --- Inventory Management ---
        function saveToInventory() {
            const item = {
                id: Date.now(),
                name: document.getElementById('newName').value,
                cat: document.getElementById('newCat').value || 'Other',
                subCat: document.getElementById('newSubCat').value || 'N/A',
                brand: document.getElementById('newBrand').value,
                rate: parseFloat(document.getElementById('newRate').value) || 0,
                img: currentPhoto || '📦'
            };

            if(!item.name || !item.rate) return alert("Name & Rate are must!");
            
            inventory.push(item);
            localStorage.setItem('myInventory', JSON.stringify(inventory));
            renderAll();
            toggleModal();
        }

        function renderAll() {
            // Render Sidebar Categories
            const cats = ['All', ...new Set(inventory.map(i => i.cat))];
            document.getElementById('sidebar').innerHTML = cats.map(c => 
                `<div onclick="filterByCat('${c}')" class="p-3 text-[10px] text-center border-b cursor-pointer">${c}</div>`
            ).join('');

            // Render Table
            renderTable(inventory);
        }

        function renderTable(data) {
            const list = document.getElementById('inventory-list');
            list.innerHTML = data.map(item => `
                <tr>
                    <td><img src="${item.img.length > 10 ? item.img : 'https://via.placeholder.com/40'}" class="img-preview"></td>
                    <td class="font-bold">${item.name}</td>
                    <td class="text-blue-600">₹${item.rate.toFixed(2)}</td>
                    <td><span class="text-[10px] block text-gray-400">${item.cat}</span>${item.subCat}</td>
                    <td>${item.brand}</td>
                    <td><button onclick="addToBill(${item.id})" class="bg-green-500 text-white w-8 h-8 rounded shadow">✅</button></td>
                </tr>
            `).join('');
        }

        function filterByCat(cat) {
            if(cat === 'All') return renderTable(inventory);
            const filtered = inventory.filter(i => i.cat === cat);
            renderTable(filtered);
        }

        // --- Billing Logic ---
        function addToBill(id) {
            const prod = inventory.find(i => i.id === id);
            const exist = cart.find(c => c.id === id);
            if(exist) exist.qty += 1;
            else cart.push({...prod, qty: 1});
            updateBillUI();
        }

        function updateQty(id, delta) {
            const item = cart.find(i => i.id === id);
            if(item) {
                item.qty = parseFloat((item.qty + delta).toFixed(3));
                if(item.qty <= 0) cart = cart.filter(i => i.id !== id);
                updateBillUI();
            }
        }

        function updateBillUI() {
            const container = document.getElementById('bill-items');
            let total = 0;
            container.innerHTML = cart.map(item => {
                const amt = item.rate * item.qty;
                total += amt;
                return `
                    <div class="flex justify-between items-center text-xs bg-white p-1 rounded shadow-sm">
                        <span class="w-1/3">${item.name}</span>
                        <div class="flex items-center gap-1">
                            <button onclick="updateQty(${item.id}, -1)" class="bg-gray-200 px-2 rounded">-</button>
                            <span class="font-bold">${item.qty}</span>
                            <button onclick="updateQty(${item.id}, 1)" class="bg-gray-200 px-2 rounded">+</button>
                        </div>
                        <span class="w-1/4 text-right font-bold">₹${amt.toFixed(2)}</span>
                    </div>
                `;
            }).join('');
            document.getElementById('grand-total').innerText = total.toFixed(2);
        }

        function toggleModal() {
            const m = document.getElementById('productModal');
            m.classList.toggle('hidden');
            m.classList.toggle('flex');
            currentPhoto = '';
            document.getElementById('photo-preview').classList.add('hidden');
        }

        function clearBill() { cart = []; updateBillUI(); }

        renderAll();
    </script>
</body>
</html>
